name: CI/CD Pipeline (ECR + Docker Deploy)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPO: seattle-ml-app
  ACCOUNT_ID: 440977420038

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # ✅ Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v3

    # ✅ Configure AWS
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # ✅ Set Variables
    - name: Set Image Variables
      run: |
        echo "ECR_URI=${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_ENV
        echo "IMAGE_TAG=${{ github.run_number }}" >> $GITHUB_ENV
        echo "FULL_IMAGE_NAME=${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ github.run_number }}" >> $GITHUB_ENV

    # ✅ Install Dependencies
    - name: Install Dependencies
      run: |
        pip3 install -r requirements.txt

    # ✅ Train Model
    - name: Train ML Model
      run: |
        python3 model.py

    # ✅ Upload Model to S3
    - name: Upload Model to S3
      run: |
        aws s3 cp model.pkl s3://seattle-ml-app/models/3/model.pkl

    # ✅ Login to ECR
    - name: Login to ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION | \
        docker login --username AWS --password-stdin $ECR_URI

    # ✅ Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t $FULL_IMAGE_NAME .

    # ✅ Push Image to ECR
    - name: Push Image
      run: |
        docker push $FULL_IMAGE_NAME

    # ✅ Create Network
    - name: Create Monitoring Network
      run: |
        docker network inspect monitoring-network >/dev/null 2>&1 || \
        docker network create monitoring-network

    # ✅ Deploy FastAPI Container
    - name: Deploy App Container
      run: |
        docker rm -f seattle-container || true
        docker run -d \
          --name seattle-container \
          --network monitoring-network \
          -p 8000:8000 \
          $FULL_IMAGE_NAME

    # ✅ Deploy Node Exporter
    - name: Deploy Node Exporter
      run: |
        docker rm -f node-exporter || true
        docker run -d \
          --name node-exporter \
          --network monitoring-network \
          -p 9100:9100 \
          prom/node-exporter

    # ✅ Deploy Prometheus
    - name: Deploy Prometheus
      run: |
        docker rm -f prometheus || true
        docker run -d \
          --name prometheus \
          --network monitoring-network \
          -p 9090:9090 \
          -v $(pwd)/prometheus.yml:/etc/prometheus/prometheus.yml \
          prom/prometheus

    # ✅ Deploy Grafana
    - name: Deploy Grafana
      run: |
        docker rm -f grafana || true
        docker run -d \
          --name grafana \
          --network monitoring-network \
          -p 3000:3000 \
          grafana/grafana
